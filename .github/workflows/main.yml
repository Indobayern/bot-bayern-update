name: Bayern Auto Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' # Berjalan otomatis setiap 3 jam

jobs:
  build:
    runs-on: ubuntu-latest
    
    # BAGIAN PENTING: Memberi izin bot untuk menulis file ke repository
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jalankan Bot
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          BLOGGER_EMAIL: ${{ secrets.BLOGGER_EMAIL }}
        run: python bot.py

      # LANGKAH SAKTI: Menyimpan catatan posted_blogs.txt agar tidak dobel posting
      - name: Simpan Catatan Berita
        run: |
          git config --global user.name "Indobayern Bot"
          git config --global user.email "bot@indobayern.com"
          git add posted_blogs.txt
          git commit -m "Bot: Update catatan berita [skip ci]" || echo "Tidak ada berita baru untuk dicatat"
          git push
